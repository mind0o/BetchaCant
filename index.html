<html>

<head>

<style type="text/css">

background-image:  linear-gradient(135deg, #444cf7 25%, transparent 25%), linear-gradient(225deg, #444cf7 25%, transparent 25%), linear-gradient(45deg, #444cf7 25%, transparent 25%), linear-gradient(315deg, #444cf7 25%, #e5e5f7 25%);

<body>

<div style="text-align: center;">
<br>
<h1 id="challengeH1">gbngbnb</h1>
<br>

<br><br>
<button onclick="startCountdown()">►</button>
<button onclick="window.location.reload()">⟳</button>

<script type="text/javascript">

let challengeTable = [
["Name __ colors",10],
["Name __ foods eaten raw",15],
["Name __ flavors of ice cream",10],
["Name __ different languages",10],
["Name __ things you rent",30],
["Name __ condiments",15],
["Name __ colors",10],
["Name __ emotions",30],
["Name __ colleges or universities",10],
["Name __ clothing brands",15]
];

let challengeId =0;
challengeId = Math.floor(Math.random() * challengeTable.length);
let timerRunning = false;
let currentText = "";
let currentTimer = 30.0;
let grad = new Date(2065, 3, 16, 17, 0, 0, 0, 0);
let diff = 0;
const aud = new Audio("https://codeskulptor-demos.commondatastorage.googleapis.com/GalaxyInvaders/explosion%2001.wav");

document.getElementById("challengeH1").innerHTML = challengeTable [challengeId][0] + " in";
  document.getElementById("timerH1").innerHTML = challengeTable [challengeId][1];
 


function startCountdown () {

  timerRunning = true;
  dd = new Date();
  grad = new Date(dd.getTime() + (challengeTable [challengeId][1])*1000);
  checkTime ();
  
}

function checkTime()
{
if (timerRunning)
{

  dd = new Date();
  diff = (grad.getTime() - dd.getTime() ) /1000;
    document.getElementById("timerH1").innerHTML = String(diff.toFixed(2));
    if(diff <= 0)
    {
      timerRunning = false;
  document.getElementById("timerH1").innerHTML = challengeTable [challengeId][1];
      aud.play(); 
   }
}
}


setInterval (checkTime, 75);

</script>
